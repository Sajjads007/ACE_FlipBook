<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook</title>
    <script src="page-flip.browser.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8e8e8;
            overflow: hidden;
        }

        #book-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #book {
            /* Let PageFlip control the size — don't force CSS size */
            touch-action: none;
        }
    </style>
</head>

<body>
<div id="book-container">
    <div id="book"></div>
</div>

<script>
    function getBookSize() {
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        const isMobile = screenW <= 600;

        if (isMobile) {
            // Full width on mobile, single page
            const w = screenW;
            const h = w * 1.414; // A4 ratio
            return { width: Math.floor(w), height: Math.floor(h), mobile: true };
        } else {
            // Desktop: fit within screen with padding
            const maxH = screenH * 0.88;
            const h = Math.min(maxH, 700);
            const w = h / 1.414;
            return { width: Math.floor(w), height: Math.floor(h), mobile: false };
        }
    }

    const size = getBookSize();

    const pageFlip = new St.PageFlip(
        document.getElementById("book"),
        {
            width: size.width,
            height: size.height,

            size: "fixed",
            showCover: false,       // ✅ No blank white page
            usePortrait: true,      // ✅ Single page on mobile
            drawShadow: true,
            flippingTime: 600,
            mobileScrollSupport: false,
            swipeDistance: 20,
            clickEventForward: true,
            autoSize: true,         // ✅ Key fix: lets PageFlip scale its canvas properly
        }
    );

    pageFlip.loadFromImages([
        "pages/Page1.jpg",
        "pages/Page2.jpg",
        "pages/Page3.jpg",
        "pages/Page4.jpg",
        "pages/Page5.jpg",
        "pages/Page6.jpg",
        "pages/Page7.jpg",
        "pages/Page8.jpg",
        "pages/Page9.jpg",
        "pages/Page10.jpg",
        "pages/Page11.jpg",
        "pages/Page12.jpg",
        "pages/Page13.jpg"
    ]);
</script>
</body>
</html>
